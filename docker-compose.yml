# docker-compose.yml
version: "3.9"

services:
  slm-platform:
    build: .
    container_name: unicc-slm
    ports:
      - "8000:8000"
    environment:
      - BASE_MODEL_ID=meta-llama/Llama-3.2-3B-Instruct
      - HF_TOKEN=${HF_TOKEN}          # pass HuggingFace token from .env
    volumes:
      - hf-cache:/root/.cache/huggingface   # cache model weights across restarts
    restart: unless-stopped

volumes:
  hf-cache:
